<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🎓 EDUC Jogos Educacionais</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #1e3a5f;
    --navy2:   #15294a;
    --teal:    #0ea5e9;
    --amber:   #f59e0b;
    --green:   #10b981;
    --coral:   #f43f5e;
    --purple:  #8b5cf6;
    --orange:  #f97316;
    --cream:   #fef9f0;
    --white:   #ffffff;
    --text:    #1e293b;
    --muted:   #64748b;
    --border:  #e2e8f0;
    --shadow: 0 4px 24px rgba(30,58,95,0.10);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  .hero { background: linear-gradient(135deg, var(--navy2) 0%, var(--navy) 60%, #1e4d8c 100%); padding: 20px 24px 40px; text-align: center; position: relative; overflow: hidden; }
  .hero-inner { position: relative; z-index: 2; max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3.4rem); color: #fff; margin-bottom: 8px; }
  
  .stats-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
  .stat-pill { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 30px; padding: 10px 22px; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(6px); color: #fff; }
  
  .main { max-width: 1140px; margin: 0 auto; padding: 0 24px 80px; position: relative; top: -15px; }
  .search-bar { display: flex; align-items: center; background: var(--white); border: 2px solid var(--border); border-radius: 16px; padding: 0 20px; box-shadow: var(--shadow); margin-bottom: 28px; }
  .search-bar input { flex: 1; border: none; outline: none; padding: 16px 14px; font-size: 1rem; font-family: 'Nunito'; }

  .tabs-wrap { overflow-x: auto; margin-bottom: 34px; padding-bottom: 4px; scrollbar-width: none; }
  .tabs { display: flex; gap: 10px; width: max-content; }
  .tab { padding: 10px 20px; border-radius: 40px; border: 2px solid var(--border); background: var(--white); cursor: pointer; font-weight: 800; transition: 0.2s; }
  .tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 24px; }
  .game-card { background: var(--white); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow); text-decoration: none; transition: 0.3s; }
  .game-card:hover { transform: translateY(-8px); }
  
  .card-thumb { height: 140px; display: flex; align-items: center; justify-content: center; position: relative; background: var(--navy); }
  .big-emoji { font-size: 4rem; z-index: 1; }
  .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
  .card-title { font-weight: 900; color: var(--navy); margin-bottom: 8px; }
  .card-desc { font-size: 0.85rem; color: var(--muted); flex: 1; margin-bottom: 16px; }
  .card-btn { background: var(--navy); color: #fff; border: none; padding: 10px; border-radius: 10px; font-weight: 800; cursor: pointer; text-align: center; }

  @media (max-width: 600px) {
    .games-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-title { font-size: 0.9rem; }
    .card-desc { display: none; }
  }

  footer { background: var(--navy2); color: rgba(255,255,255,0.6); text-align: center; padding: 40px 20px; margin-top: 40px; }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <h1>Aprender nunca foi tão divertido!</h1>
    <div class="stats-row">
      <div class="stat-pill"><span class="icon">🎮</span> <div class="val" id="total-count">21</div> <div class="lbl">Jogos</div></div>
      <div class="stat-pill"><span class="icon">📐</span> <div class="val">5</div> <div class="lbl">Disciplinas</div></div>
    </div>
  </div>
</header>

<main class="main">
  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="Buscar jogo..." oninput="filterGames()">
  </div>

  <div class="tabs-wrap">
    <div class="tabs" id="tabs">
      <div class="tab active" onclick="filterByCategory('Todos')">Todos</div>
      <div class="tab" onclick="filterByCategory('Matemática')">Matemática</div>
      <div class="tab" onclick="filterByCategory('Português')">Português</div>
      <div class="tab" onclick="filterByCategory('Lógica')">Lógica</div>
      <div class="tab" onclick="filterByCategory('Programação')">Programação</div>
      <div class="tab" onclick="filterByCategory('Educativo')">Educativo</div>
    </div>
  </div>

  <div class="games-grid" id="gamesGrid"></div>
</main>

<footer>
  Desenvolvido pelo <strong>Professor Sebastião Alves de Almeida</strong>
</footer>

<script>
const games = [
  /* 7 JOGOS COMENTADOS (PRESERVADOS)
  { title: "Desafio Matemático: Festival de Pipas", desc: "Duelos de lógica e matemática.", emoji: "🪁", category: "Matemática", url: "https://alvesdealmeida.github.io/pipasMatematica/" },
  { title: "Folclore Brasileiro", desc: "Vocabulário e cultura.", emoji: "🌿", category: "Português", url: "https://alvesdealmeida.github.io/vocabularioFolcloreBR/" },
  { title: "Mestre da Tabuada", desc: "Domine as operações.", emoji: "🧮", category: "Matemática", url: "https://alvesdealmeida.github.io/tabuadaMultiplicacao/" },
  { title: "Pacman de Palavras", desc: "Alfabetização interativa.", emoji: "🟡", category: "Educativo", url: "https://alvesdealmeida.github.io/pacmanPortugues/" },
  { title: "Smart City: Eco-Robô", desc: "Interdisciplinar e sustentável.", emoji: "🤖", category: "Educativo", url: "https://alvesdealmeida.github.io/smartCity/" },
  { title: "Reparo Crítico 3D", desc: "Depuração de dados em 3D.", emoji: "☢️", category: "Educativo", url: "https://alvesdealmeida.github.io/nucleo3D/" },
  { title: "Cofre da Memória", desc: "Desafio de sílabas e conexões.", emoji: "🧠", category: "Educativo", url: "https://alvesdealmeida.github.io/cofredaMemoria/" },
  */
  { title: "Pixel Educ Pro", desc: "Lógica e Pixel Art.", emoji: "✏️", category: "Educativo", url: "https://alvesdealmeida.github.io/pixelEduc/" },
  { title: "Super Missão Brasil", desc: "Aventura sobre o Brasil.", emoji: "🍄", category: "Educativo", url: "https://alvesdealmeida.github.io/missaoBrasil/" },
  { title: "Robo Code Kids", desc: "Aprenda a programar.", emoji: "👨‍💻", category: "Programação", url: "https://alvesdealmeida.github.io/robocodeKids/" },
  { title: "Astro Crew Beta", desc: "Missões espaciais de lógica.", emoji: "🚀", category: "Programação", url: "https://alvesdealmeida.github.io/jogoOffLine/" },
  { title: "Spider Match Matemática", desc: "Cálculos com números inteiros.", emoji: "🕷️", category: "Matemática", url: "https://alvesdealmeida.github.io/spiderMatematica/" },
  { title: "Copa Matemática", desc: "Gols e operações matemáticas.", emoji: "🏆", category: "Matemática", url: "https://alvesdealmeida.github.io/copaMatematica/" },
  { title: "MathGame", desc: "Adição e subtração divertida.", emoji: "➕", category: "Matemática", url: "https://alvesdealmeida.github.io/mathGame/" },
  { title: "ComDecom", desc: "Decomposição numérica.", emoji: "🔢", category: "Matemática", url: "https://alvesdealmeida.github.io/comDEcom/" },
  { title: "Material Dourado", desc: "Valor posicional visual.", emoji: "🟡", category: "Matemática", url: "https://alvesdealmeida.github.io/joguinhoMD/" },
  { title: "Torre de Hanói", desc: "O clássico desafio de lógica.", emoji: "🗼", category: "Lógica", url: "https://alvesdealmeida.github.io/torreHanoi/" },
  { title: "Cidades Algoritmos 3D", desc: "Logística e sequenciamento.", emoji: "🏙️", category: "Programação", url: "https://alvesdealmeida.github.io/cidadeAlgoritmos/" },
  { title: "Mostrabot Mobile", desc: "Programação direcional para robôs.", emoji: "🤖", category: "Robótica", url: "https://alvesdealmeida.github.io/mostrabot/" },
  { title: "Expedição Morse", desc: "História e Código Morse.", emoji: "📻", category: "Educativo", url: "https://alvesdealmeida.github.io/expedicaoMorse/" },
  { title: "Bio Registro: Animais", desc: "Pesquisa sobre vertebrados.", emoji: "🐳", category: "Educativo", url: "https://alvesdealmeida.github.io/bioRegistro/" }
];

function renderGames(data) {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = data.map(game => `
    <a href="${game.url}" class="game-card" target="_blank">
      <div class="card-thumb"><span class="big-emoji">${game.emoji}</span></div>
      <div class="card-body">
        <h3 class="card-title">${game.title}</h3>
        <p class="card-desc">${game.desc}</p>
        <div class="card-btn">JOGAR AGORA</div>
      </div>
    </a>
  `).join('');
}

function filterGames() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  const filtered = games.filter(g => g.title.toLowerCase().includes(term) || g.desc.toLowerCase().includes(term));
  renderGames(filtered);
}

function filterByCategory(cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if(cat === 'Todos') return renderGames(games);
  const filtered = games.filter(g => g.category === cat);
  renderGames(filtered);
}

renderGames(games);
</script>
</body>
</html>
